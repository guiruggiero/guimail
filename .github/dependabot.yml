version: 2

updates:
  - package-ecosystem: npm
    directories:
      - /worker
      - /functions
      - /gateway
    schedule:
      interval: weekly
      day: saturday
      time: "00:00"
      timezone: America/Los_Angeles
    groups:
      new-versions:
        applies-to: version-updates
        update-types:
          - patch
          - minor
          - major
      security-patches:
        applies-to: security-updates
        update-types:
          - patch
          - minor
          - major